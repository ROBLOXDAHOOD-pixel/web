<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* CSS: The "Operational" Look */
        body { background-color: #1a1a1a; color: #889070; font-family: 'Courier New', monospace; margin: 20px; }
        .grid-container { display: grid; grid-template-columns: 200px 1fr 200px; gap: 10px; }
        .panel { border: 1px solid #889070; padding: 10px; }
        header { border-bottom: 2px solid #889070; margin-bottom: 20px; padding-bottom: 10px; }
        h1 { text-transform: uppercase; letter-spacing: 2px; }
        .placeholder { height: 100px; border: 1px dashed #444; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>PHOTOGRAPHY // OPERATIONAL</h1>
        <p>[COMMAND CENTER: ACTIVE]</p>
    </header>

    <div class="grid-container">
        <!-- Sidebar -->
        <div class="panel">
            <p>PORTFOLIO</p>
            <p>PROJECTS</p>
            <p>CONTACT</p>
        </div>

        <!-- Main Content -->
        <div class="panel">
            <h2>IMAGE STREAM // ANALYSIS</h2>
            <div class="placeholder"></div>
            <p>METADATA: [ISO: 3200 | SHUTTER: 1/1600]</p>
            <button>SIDELINE OPERATIONAL ACCESS</button>
        </div>

        <!-- Right Panel -->
        <div class="panel">
            <p>CLEARANCE: LEVEL 1</p>
        </div>
    </div>

</body>
</html>
